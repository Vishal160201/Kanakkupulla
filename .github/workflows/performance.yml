name: Performance Tests
on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      scenario:
        description: Test scenario to run
        type: choice
        options:
          - smoke
          - load
          - stress
          - soak
          - journey
        default: load
      strict:
        description: Fail CI on budget violations
        type: boolean
        default: false

env:
  PERF_BASE_URL: http://localhost:3000
  DATABASE_URL: ${{ secrets.DATABASE_URL }}
  NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET || 'perf-ci-secret-key' }}
  NEXTAUTH_URL: http://localhost:3000

jobs:
  performance:
    name: Performance Test (${{ inputs.scenario || 'load' }})
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Start Next.js dev server
        run: |
          npm run dev &
          echo "Waiting for server to start..."
          npx wait-on http://localhost:3000 -t 30000
        timeout-minutes: 2

      - name: Clean previous test data
        run: npm run cleanup:loadtest
        continue-on-error: true

      - name: Seed test data
        run: |
          SEED_BOOKINGS=5000 \
          SEED_TRANSACTIONS=2500 \
          SEED_CLIENTS=50 \
          SEED_PRODUCTS=10 \
          npm run seed:loadtest
        timeout-minutes: 5

      - name: Run performance tests
        run: |
          npm run "test:perf:${{ inputs.scenario || 'load' }}"
        timeout-minutes: 15

      - name: Check performance budgets
        run: |
          if [[ "${{ inputs.strict }}" == "true" ]]; then
            node perf/check-budgets.js --strict
          else
            node perf/check-budgets.js
          fi
        continue-on-error: ${{ !inputs.strict }}

      - name: Upload performance results
        uses: actions/upload-artifact@v4
        with:
          name: perf-results-${{ github.run_id }}
          path: perf-results/
          retention-days: 30

      - name: Clean up test data
        run: npm run cleanup:loadtest
        continue-on-error: true
        if: always()

      - name: Summary comment
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const resultsDir = './perf-results';

            if (!fs.existsSync(resultsDir)) {
              console.log('No perf results to comment');
              return;
            }

            const files = fs.readdirSync(resultsDir)
              .filter(f => f.endsWith('.json'))
              .sort()
              .reverse();

            if (files.length === 0) return;

            const latest = JSON.parse(fs.readFileSync(path.join(resultsDir, files[0]), 'utf8'));
            const { summary, endpoints } = latest;

            let body = `## Performance Test Results\n\n`;
            body += `| Metric | Value |\n|--------|-------|\n`;
            body += `| Scenario | ${latest.scenario} |\n`;
            body += `| Total Requests | ${summary.totalRequests} |\n`;
            body += `| Total Errors | ${summary.totalErrors} |\n`;
            body += `| Avg Throughput | ${summary.avgThroughput.toFixed(2)} req/s |\n`;
            body += `| Passed Endpoints | ${summary.passedEndpoints}/${endpoints.length} |\n\n`;

            body += `### Endpoint Results\n\n`;
            body += `| Endpoint | Method | Req/s | p50 | p90 | p99 | Errors | Status |\n`;
            body += `|----------|--------|-------|-----|-----|-----|--------|--------|\n`;

            for (const ep of endpoints) {
              const status = ep.passed ? '✅' : '❌';
              const url = ep.url.replace(latest.url ? latest.url.split('/api')[0] : '', '');
              body += `| ${url} | ${ep.method} | ${ep.requestsPerSec.toFixed(1)} | ${ep.latencyP50.toFixed(0)}ms | ${ep.latencyP90.toFixed(0)}ms | ${ep.latencyP99.toFixed(0)}ms | ${ep.errors} | ${status} |\n`;
            }

            body += `\n_Results auto-generated from run #${context.runId}_`;

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });